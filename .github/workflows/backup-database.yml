name: Backup Supabase database

on:
  schedule:
    - cron: '0 7 * * 0'
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Dump database (pg_dump 17 via Docker, matching Supabase's server version)
        run: docker run --rm postgres:17 pg_dump "${{ secrets.SUPABASE_DB_URL }}" --no-owner --no-privileges -F c -f - > backup.dump

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ github.run_id }}
          path: backup.dump
          retention-days: 90
