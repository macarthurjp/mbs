name: Keep Supabase project active

on:
  schedule:
    - cron: '0 6 */3 * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query the database to reset Supabase's inactivity timer
        run: |
          curl -sf "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/negocios?select=id&limit=1" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -o /dev/null
